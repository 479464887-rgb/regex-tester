<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Regex Tester - 免费在线工具</title>
<meta name="description" content="在线正则表达式测试工具 - 实时匹配高亮，支持 JS/Python 语法">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:18px;font-weight:700;color:#58a6ff}
.logo span{color:#f0c040}
header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}
main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}
.tool-wrapper{padding:20px 0}
footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}
footer a{color:#58a6ff;text-decoration:none;margin:0 8px}
.btn-primary:hover{background:#2ea043!important}
.btn:hover{background:#30363d!important}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}
.btn{font-family:inherit}
</style>
</head>
<body>
<header>
  <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
  <div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div>
</header>
<main>
  <h1 style="font-size:24px;margin-bottom:4px">Regex Tester</h1>
  <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线正则表达式测试工具 - 实时匹配高亮，支持 JS/Python 语法</p>
<div class="tool-wrapper">
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:end">
    <div style="flex:1"><label style="font-size:12px;color:#8b949e;display:block;margin-bottom:4px">正则表达式</label>
    <div style="display:flex;align-items:center;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0 12px">
      <span style="color:#f85149;font-family:mono;font-size:14px">/</span>
      <input id="regex-pattern" placeholder="正则表达式" style="flex:1;padding:10px 4px;font-size:14px;border:none;background:transparent;color:#58a6ff;outline:none;font-family:mono">
      <span style="color:#f85149;font-family:mono;font-size:14px">/</span>
      <input id="regex-flags" placeholder="gmi" style="width:40px;padding:10px 4px;font-size:14px;border:none;background:transparent;color:#3fb950;outline:none;font-family:mono">
    </div></div>
  </div>
  <textarea id="regex-text" placeholder="输入测试文本..." rows="6" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6"></textarea>
  <div id="regex-result" style="margin-top:12px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;min-height:100px;font-family:mono;font-size:13px;line-height:1.8;color:#c9d1d9;white-space:pre-wrap;word-break:break-all">输入正则和测试文本查看匹配结果</div>
</div>
</main>
<footer>
  <a href="https://github.com/479464887-rgb/regex-tester">GitHub</a>
  <span>·</span>
  <span>© 2026 DevKit</span>
</footer>
<script>function testRegex(){
  const pattern=document.getElementById('regex-pattern').value;
  const flags=document.getElementById('regex-flags').value;
  const text=document.getElementById('regex-text').value;
  const res=document.getElementById('regex-result');
  if(!pattern){res.innerHTML='<span style=color:#8b949e>输入正则表达式</span>';return;}
  try{
    const re=new RegExp(pattern,flags);
    const matches=[...text.matchAll(re)];
    if(!matches.length){res.innerHTML='<span style=color:#d29922>无匹配</span>';return;}
    let html=`<div style=color:#3fb950;margin-bottom:8px>✓ ${matches.length} 个匹配</div>`;
    let highlighted=text;
    let offset=0;
    for(const m of matches){
      const start=m.index+offset;
      const len=m[0].length;
      highlighted=highlighted.substring(0,start)+'<mark style=background:#f0c04040;color:#f0c040;border-radius:2px;padding:1px 0>'+highlighted.substring(start,start+len)+'</mark>'+highlighted.substring(start+len);
      offset+=('<mark style=background:#f0c04040;color:#f0c040;border-radius:2px;padding:1px 0></mark>'.length-2);
      html+=`<div style="margin-bottom:4px">[${m.index}] ${m[0].substring(0,100)}${m[0].length>100?'...':''}</div>`;
      if(m.groups){html+='<div style="margin-left:16px;color:#8b949e;font-size:12px">'+JSON.stringify(m.groups)+'</div>';}
    }
    html+='<div style="margin-top:12px;border-top:1px solid #30363d;padding-top:8px;font-size:12px;color:#8b949e">高亮预览:</div><div style="line-height:2">'+highlighted+'</div>';
    res.innerHTML=html;
  }catch(e){res.innerHTML='<span style=color:#f85149>❌ '+e.message+'</span>';}
}
['regex-pattern','regex-flags','regex-text'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{clearTimeout(window._rt);window._rt=setTimeout(testRegex,300)}));
</script>
</body>
</html>
